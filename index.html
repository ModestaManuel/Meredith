<body>

<div class="card">
    <h1 id="pergunta">Olá Meredith ❤️</h1>
    <p id="texto">Preparada para responder a algumas perguntas muito importantes?</p>

    <button onclick="proxima()">Sim ❤️</button>
</div>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    font-family:Arial,sans-serif;
}

.card{
    background:white;
    padding:30px;
    border-radius:25px;
    width:80%;
    max-width:600px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    color:#ff4d6d;
}

p{
    font-size:22px;
}

button{
    margin-top:20px;
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:50px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}
</style>

<script>

const perguntas = [
"Tu sabes que eu te amo muito? ❤️",
"Mesmo quando finges que não tens saudades minhas? 😒",
"Concordas que somos duas gostosas incrível? 😌",
"Concordas que devíamos viver juntas? ",
"Concordas que os nossos filhos vão ser lindos? 👶",
"Concordas que vamos ter 6 filhos? 😂",
"Concordas que a Alaska vai ser a nossa filha favorita? 👀",
"Concordas que eu sou uma excelente candidata a esposa? ",
"Então aceitas continuar a aturar-me para sempre? ❤️"
];

let i = 0;

function proxima(){

    if(i < perguntas.length){
        document.getElementById("texto").innerHTML = perguntas[i];
        i++;
    }else{
        document.getElementById("pergunta").innerHTML = "Resultado Final ❤️";
        document.getElementById("texto").innerHTML =
        "Parabéns! Após uma análise rigorosa das tuas respostas, concluímos que:<br><br>" +
        "❤️ Pagar meu 2000.<br>" +
        "❤️ Vamos ter 6 filhos.<br>" +
        "❤️ A Alaska será a favorita.<br>" +
        "❤️ E vamos ser muito felizes juntas. 🥰";
        document.querySelector("button").innerHTML = "❤️ Eu sabia ❤️";
    }
}

</script>

</body>
