<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Very Important Quiz ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.card{
    background:white;
    padding:30px;
    border-radius:25px;
    width:85%;
    max-width:600px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
    color:#ff4d6d;
}

#question{
    font-size:24px;
    margin:25px 0;
}

button{
    border:none;
    border-radius:50px;
    cursor:pointer;
    padding:15px 30px;
    font-size:20px;
}

#yes{
    background:#ff4d6d;
    color:white;
    transition:0.3s;
}

#no{
    background:#ddd;
    position:relative;
    margin-left:10px;
}
</style>
</head>
<body>

<div class="card">
    <h1>❤️ Meredith ❤️</h1>

    <div id="question">
        Are you ready for the most important quiz of your life?
    </div>

    <button id="yes" onclick="nextQuestion()">Yes ❤️</button>
    <button id="no" onclick="moveNo()">No 💔</button>
</div>

<script>

const questions = [
    "Do you love me? ❤️",
    "Do you think we're an amazing couple? 🥰",
    "Will we always support each other? ❤️",
    "Will we travel together someday? ✈️",
    "Will we have 3 kids? 👶👶👶",
    "Will Alaska be our favorite daughter? 😂",
    "Will you keep loving me forever? ❤️"
];

let current = 0;
let yesSize = 20;

function nextQuestion(){

    if(current < questions.length){
        document.getElementById("question").innerHTML = questions[current];
        current++;
    } else {

        document.querySelector(".card").innerHTML = `
            <h1>❤️ Final Results ❤️</h1>
            <p style="font-size:22px">
                After an extremely rigorous scientific study, we have concluded that:
                <br><br>
                ✅ You love me.<br>
                ✅ We're an amazing couple.<br>
                ✅ We'll have 3 kids.<br>
                ✅ Alaska will be our favorite daughter.<br>
                ✅ We'll make lots of beautiful memories together.<br><br>
                ❤️ Case closed. ❤️
            </p>
        `;
    }
}

function moveNo(){

    const noBtn = document.getElementById("no");

    noBtn.style.position = "fixed";
    noBtn.style.left =
        Math.random() * (window.innerWidth - 120) + "px";
    noBtn.style.top =
        Math.random() * (window.innerHeight - 60) + "px";

    yesSize += 8;

    document.getElementById("yes").style.fontSize =
        yesSize + "px";
}
</script>

</body>
</html>
