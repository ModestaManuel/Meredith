<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pergunta Muito Importante ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.card{
    background:white;
    padding:30px;
    border-radius:25px;
    width:80%;
    max-width:600px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    color:#ff4d6d;
}

p{
    font-size:22px;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:50px;
    cursor:pointer;
}

#sim{
    background:#ff4d6d;
    color:white;
    margin-right:10px;
}

#nao{
    position:absolute;
    background:#ddd;
}
</style>
</head>

<body>

<div class="card">
    <h1>❤️ Meredith ❤️</h1>
    <p id="pergunta">
        Aceitas que eu te amo muito?
    </p>

    <button id="sim" onclick="proxima()">Sim ❤️</button>
    <button id="nao">Não 💔</button>
</div>

<script>

const perguntas = [
"Concordas que fazemos uma boa equipa? 🥰",
"Concordas que vamos viajar muito juntas? ✈️",
"Concordas que vamos ter 6 filhos? 👶👶👶",
"Concordas que a Alaska vai ser a nossa filha favorita? ",
"Concordas que sou uma excelente candidata a esposa? ",
"Queres continuar comigo por muito, muito tempo? ❤️"
];

let indice = 0;

function proxima(){

    if(indice < perguntas.length){
        document.getElementById("pergunta").innerHTML = perguntas[indice];
        indice++;
    } else {
        document.getElementById("pergunta").innerHTML =
        "Resultado Final ❤️<br><br>" +
        "Após análise científica extremamente rigorosa, concluímos que:<br><br>" +
        "✅ Amori, me amas.<br>" +
        "✅ Vamos ter 6 filhos.<br>" +
        "✅ A Alaska será a favorita.<br>" +
        "✅ E seremos muito felizes. 🥰";

        document.getElementById("sim").innerHTML = "❤️ Confirmado ❤️";
    }
}

const nao = document.getElementById("nao");

document.addEventListener("mousemove", (e) => {

    const rect = nao.getBoundingClientRect();

    const distancia =
    Math.hypot(
        e.clientX - (rect.left + rect.width/2),
        e.clientY - (rect.top + rect.height/2)
    );

    if(distancia < 120){
        const x = Math.random() * (window.innerWidth - 120);
        const y = Math.random() * (window.innerHeight - 60);

        nao.style.left = x + "px";
        nao.style.top = y + "px";
    }
});

</script>

</body>
</html>
